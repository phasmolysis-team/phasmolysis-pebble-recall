services:
  postgres:
    image: postgres:16-alpine
    container_name: pebble-recall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG__USER:-postgres}
      POSTGRES_DB: ${PG__DBNAME:-pebble}
      POSTGRES_PASSWORD: ${PG__PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PG__PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG__USER:-postgres} -d ${PG__DBNAME:-pebble}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pebble-recall-migrations
    environment:
      PG__HOST: postgres
      PG__PORT: 5432
      PG__USER: ${PG__USER:-postgres}
      PG__DBNAME: ${PG__DBNAME:-pebble}
      PG__PASSWORD: ${PG__PASSWORD}
      PG_URL: postgresql+asyncpg://${PG__USER:-postgres}:${PG__PASSWORD}@postgres:5432/${PG__DBNAME:-pebble}
    command: uv run alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pebble-recall-app
    restart: unless-stopped
    environment:
      PG__HOST: postgres
      PG__PORT: 5432
      PG__USER: ${PG__USER:-postgres}
      PG__DBNAME: ${PG__DBNAME:-pebble}
      PG__PASSWORD: ${PG__PASSWORD}
      PG_URL: postgresql+asyncpg://${PG__USER:-postgres}:${PG__PASSWORD}@postgres:5432/${PG__DBNAME:-pebble}
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  postgres_data:
